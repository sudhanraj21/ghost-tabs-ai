<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Blue-toned gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <!-- Ghost body gradient - blue tint -->
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="50%" style="stop-color:#bae6fd"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0d1b2a" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>
  
  <!-- Subtle border glow -->
  <rect x="1" y="1" width="126" height="126" rx="27" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Ghost body - classic sheet ghost shape -->
  <g filter="url(#shadow)">
    <path d="M64 20 
             C30 20 20 45 20 65 
             C20 85 30 100 34 106
             L34 106
             C36 102 38 90 44 84
             C50 78 54 82 64 82
             C74 82 78 78 84 84
             C90 90 92 102 94 106
             L94 106
             C98 100 108 85 108 65
             C108 45 98 20 64 20 Z" 
          fill="url(#ghostGrad)" filter="url(#glow)"/>
  </g>
  
  <!-- Wavy bottom edge -->
  <path d="M20 65 
           Q28 75 34 65 
           Q42 55 50 65 
           Q58 75 64 65 
           Q70 55 78 65 
           Q86 75 94 65 
           Q102 55 108 65" 
        fill="url(#ghostGrad)"/>
  
  <!-- Face - eyes -->
  <ellipse cx="44" cy="52" rx="8" ry="10" fill="#0d1b2a"/>
  <ellipse cx="84" cy="52" rx="8" ry="10" fill="#0d1b2a"/>
  
  <!-- Eye highlights -->
  <circle cx="47" cy="48" r="3" fill="white"/>
  <circle cx="87" cy="48" r="3" fill="white"/>
  
  <!-- Cute blush - blue tinted -->
  <ellipse cx="30" cy="64" rx="6" ry="4" fill="#7dd3fc" opacity="0.5"/>
  <ellipse cx="98" cy="64" rx="6" ry="4" fill="#7dd3fc" opacity="0.5"/>
  
  <!-- Smile -->
  <path d="M52 68 Q64 80 76 68" fill="none" stroke="#0d1b2a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Subtle highlight on top -->
  <ellipse cx="64" cy="32" rx="20" ry="8" fill="white" opacity="0.3"/>
</svg>