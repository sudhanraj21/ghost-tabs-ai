<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Dark navy/slate blue gradient background - not pure black -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3a4a"/>
      <stop offset="50%" style="stop-color:#1e2832"/>
      <stop offset="100%" style="stop-color:#151d26"/>
    </linearGradient>
    
    <!-- Ghost body gradient - pale icy blue with shading -->
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="40%" style="stop-color:#c5e3f6"/>
      <stop offset="100%" style="stop-color:#9fd4f2"/>
    </linearGradient>
    
    <!-- Soft glow for ghost body -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle drop shadow for ghost -->
    <filter id="ghostShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2633" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background - rounded square -->
  <rect width="128" height="128" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Subtle inner glow/light behind ghost -->
  <ellipse cx="64" cy="55" rx="40" ry="45" fill="#3d4f63" opacity="0.3"/>
  
  <!-- Ghost body - tall rounded shape with two leg dips -->
  <g filter="url(#ghostShadow)">
    <path d="M64 18 
             C40 18 28 35 28 58 
             C28 78 36 92 42 100
             Q42 108 48 100
             Q54 92 64 100
             Q74 92 80 100
             Q86 108 86 100
             C92 92 100 78 100 58
             C100 35 88 18 64 18 Z" 
          fill="url(#ghostGrad)" filter="url(#softGlow)"/>
  </g>
  
  <!-- Left eye - large glossy black -->
  <ellipse cx="46" cy="52" rx="9" ry="11" fill="#0d1117"/>
  <!-- Left eye highlight -->
  <ellipse cx="49" cy="48" rx="3.5" ry="4" fill="white" opacity="0.9"/>
  <circle cx="43" cy="54" r="1.5" fill="white" opacity="0.5"/>
  
  <!-- Right eye - large glossy black -->
  <ellipse cx="82" cy="52" rx="9" ry="11" fill="#0d1117"/>
  <!-- Right eye highlight -->
  <ellipse cx="85" cy="48" rx="3.5" ry="4" fill="white" opacity="0.9"/>
  <circle cx="79" cy="54" r="1.5" fill="white" opacity="0.5"/>
  
  <!-- Small subtle smile -->
  <path d="M56 72 Q64 78 72 72" fill="none" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  
  <!-- Subtle top highlight on ghost -->
  <ellipse cx="64" cy="32" rx="18" ry="6" fill="white" opacity="0.25"/>
</svg>