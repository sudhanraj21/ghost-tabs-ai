<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostTabs AI - Store Screenshots</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; padding: 40px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { text-align: center; color: #e94560; font-size: 2.5em; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
    .screenshots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .screenshot { background: #16213e; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .screenshot img { width: 100%; display: block; }
    .screenshot-label { padding: 15px; text-align: center; color: #e94560; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🕷️ GhostTabs AI</h1>
    <p class="subtitle">Store Listing Preview</p>
    
    <div class="screenshots">
      <div class="screenshot">
        <img src="screenshot-settings.png" alt="Settings Page">
        <div class="screenshot-label">⚙️ Settings Page</div>
      </div>
      <div class="screenshot">
        <img src="screenshot-sidepanel.png" alt="Side Panel">
        <div class="screenshot-label">📋 Side Panel</div>
      </div>
      <div class="screenshot">
        <img src="screenshot-dock.png" alt="Floating Dock">
        <div class="screenshot-label">🚀 Floating Dock</div>
      </div>
    </div>
  </div>
</body>
</html>
