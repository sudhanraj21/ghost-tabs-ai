<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Dark rounded square background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    
    <!-- Ghost body - cyan/blue like reference -->
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8AD0FF"/>
      <stop offset="50%" style="stop-color:#5AA6F2"/>
      <stop offset="100%" style="stop-color:#3D8FE8"/>
    </linearGradient>
    
    <!-- Soft glow for ghost -->
    <filter id="softGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background - dark rounded square -->
  <rect width="128" height="128" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Ghost body with two rounded leg dips -->
  <g filter="url(#shadow)">
    <path d="M64 16 
             C38 16 24 36 24 60 
             C24 80 30 100 40 106
             Q40 116 48 106
             Q48 98 52 94
             Q64 106 76 94
             Q80 98 80 106
             Q88 116 88 106
             C98 100 104 80 104 60
             C104 36 90 16 64 16 Z" 
          fill="url(#ghostGrad)" filter="url(#softGlow)"/>
  </g>
  
  <!-- Left eye -->
  <ellipse cx="44" cy="54" rx="10" ry="12" fill="#0d1117"/>
  <ellipse cx="48" cy="50" rx="4" ry="5" fill="white"/>
  
  <!-- Right eye -->
  <ellipse cx="84" cy="54" rx="10" ry="12" fill="#0d1117"/>
  <ellipse cx="88" cy="50" rx="4" ry="5" fill="white"/>
  
  <!-- Smile -->
  <path d="M54 76 Q64 84 74 76" fill="none" stroke="#0d1117" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Top highlight -->
  <ellipse cx="64" cy="32" rx="16" ry="5" fill="white" opacity="0.25"/>
</svg>